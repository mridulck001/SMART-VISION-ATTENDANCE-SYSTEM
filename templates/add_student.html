<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page-container main-wrapper fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Add Student & Capture Faces</h4>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="/admin">Back to Admin</a>
      <a class="btn btn-danger" href="/admin/logout">Logout</a>
    </div>
  </div>
  
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
      <div class="glass-panel p-4 p-md-5">
        <form id="studentForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input class="form-control" name="name" placeholder="John Doe" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Roll</label>
              <input class="form-control" name="roll" placeholder="e.g. 101">
            </div>
            <div class="col-md-3">
              <label class="form-label">Registration No</label>
              <input class="form-control" name="reg_no" placeholder="REG101">
            </div>
            <div class="col-md-6">
              <label class="form-label">Class</label>
              <input class="form-control" name="class" placeholder="10th">
            </div>
            <div class="col-md-6">
              <label class="form-label">Section</label>
              <input class="form-control" name="sec" placeholder="A">
            </div>
          </div>
          <div class="mt-4 d-flex flex-wrap gap-3">
            <button id="saveInfoBtn" type="submit" class="btn btn-primary flex-grow-1">Save Info</button>
            <button id="startCaptureBtn" type="button" class="btn btn-outline-secondary flex-grow-1" disabled>Start Capture (50)</button>
            <button id="addStudentBtn" type="button" class="btn btn-success flex-grow-1" disabled>Add Student</button>
          </div>
        </form>

        <hr class="my-5" style="border-color: var(--panel-border);">

        <div class="text-center">
          <div class="video-container mx-auto" style="max-width: 560px;">
            <video id="video" width="560" height="420" autoplay muted></video>
          </div>
          <div class="mt-4 max-w-md mx-auto" style="max-width: 560px;">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-white fw-medium">Capture Progress</span>
              <span id="captureStatus" class="text-muted small">0 / 50</span>
            </div>
            <div class="progress">
              <div id="progressBar" class="progress-bar" style="width:0%"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
</body>
</html>
