<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mark Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .recognized-list {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .list-group-item {
      background: transparent;
      color: var(--text-main);
      border-color: var(--panel-border);
      padding: 1rem 1.25rem;
    }
    
    .list-group-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
<div class="page-container main-wrapper fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-1">Mark Attendance</h4>
      <p class="text-muted small mb-0">Live face recognition scanner.</p>
    </div>
    <a class="btn btn-outline-secondary" href="/">Back to Home</a>
  </div>

  <div class="glass-panel p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="mb-0 text-white">Scanner Control</h5>
      <div class="d-flex gap-2">
        <button id="startMarkBtn" class="btn btn-primary">Start Scanner</button>
        <button id="stopMarkBtn" class="btn btn-danger" disabled>Stop</button>
      </div>
    </div>

    <div class="row g-4 mt-2">
      <div class="col-md-7 text-center">
        <div class="video-container mx-auto">
          <video id="markVideo" width="560" height="420" autoplay muted></video>
        </div>
        <div class="mt-3 d-inline-flex align-items-center px-4 py-2" style="background: rgba(255, 255, 255, 0.05); border-radius: 999px; border: 1px solid var(--panel-border);">
          <span id="markPulse" class="status-pulse"></span>
          <span id="markStatus" class="fw-medium text-white">Waiting for start...</span>
        </div>
      </div>
      <div class="col-md-5">
        <h6 class="mb-3 text-white">Recognized (Current Session)</h6>
        <div class="recognized-list h-100">
          <ul id="recognizedList" class="list-group list-group-flush h-100" style="min-height: 200px; max-height: 420px; overflow-y: auto;">
            <li class="list-group-item text-muted text-center py-4 border-0">No faces recognized yet</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/camera_mark.js') }}"></script>
<script>
  // Add simple script to toggle pulse color based on status
  const startBtn = document.getElementById('startMarkBtn');
  const stopBtn = document.getElementById('stopMarkBtn');
  const pulse = document.getElementById('markPulse');
  const status = document.getElementById('markStatus');
  
  startBtn.addEventListener('click', () => {
    pulse.classList.add('active');
    status.innerText = "Scanning active...";
  });
  
  stopBtn.addEventListener('click', () => {
    pulse.classList.remove('active');
    status.innerText = "Scanner stopped.";
  });
</script>
</body>
</html>
