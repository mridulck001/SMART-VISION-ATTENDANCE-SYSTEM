<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 0.5rem 1.25rem;
      font-weight: 500;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .filter-btn:hover, .filter-btn.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent-blue);
      border-color: rgba(56, 189, 248, 0.4);
    }
  </style>
</head>
<body>
<div class="page-container main-wrapper fade-in">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
    <div>
      <h4 class="mb-1">Attendance Records</h4>
      <p class="text-muted small mb-0">View and export all logged attendance data.</p>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="/admin">Back to Admin</a>
      <a class="btn btn-outline-light" href="/download_csv">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download me-1" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
        Download CSV
      </a>
      <a class="btn btn-danger" href="/admin/logout">Logout</a>
    </div>
  </div>

  <div class="glass-panel p-4">
    <div class="d-flex flex-wrap gap-2 mb-4">
      <a href="/attendance_record?period=all" class="filter-btn active">All</a>
      <a href="/attendance_record?period=daily" class="filter-btn">Daily</a>
      <a href="/attendance_record?period=weekly" class="filter-btn">Weekly</a>
      <a href="/attendance_record?period=monthly" class="filter-btn">Monthly</a>
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-hover mb-0">
        <thead>
          <tr>
            <th class="ps-3">ID</th>
            <th>Student ID</th>
            <th>Name</th>
            <th>Timestamp (UTC)</th>
          </tr>
        </thead>
        <tbody>
        {% for r in records %}
          <tr>
            <td class="ps-3 text-muted">#{{ r[0] }}</td>
            <td class="fw-medium text-white">{{ r[1] }}</td>
            <td class="fw-medium text-white">{{ r[2] }}</td>
            <td class="text-muted">{{ r[3] }}</td>
          </tr>
        {% else %}
          <tr>
            <td colspan="4" class="text-center text-muted py-5">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-inbox mb-2" viewBox="0 0 16 16">
                <path d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4H4.98zm-1.17-.437A1.5 1.5 0 0 1 4.98 3h6.04a1.5 1.5 0 0 1 1.17.563l3.7 4.625a.5.5 0 0 1 .106.34l-.39 3.124A1.5 1.5 0 0 1 14.117 13H1.883a1.5 1.5 0 0 1-1.489-1.314l-.39-3.124a.5.5 0 0 1 .106-.34l3.7-4.625zM1 8.5v3.124a.5.5 0 0 0 .496.438h12.008a.5.5 0 0 0 .496-.438V8.5h-4.23a2.5 2.5 0 0 1-4.532 0H1z"/>
              </svg>
              <br>No attendance records found for this period.
            </td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // Simple script to set active filter button based on URL
  const urlParams = new URLSearchParams(window.location.search);
  const period = urlParams.get('period') || 'all';
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.getAttribute('href').includes('period=' + period)) {
      btn.classList.add('active');
    }
  });
</script>
</body>
</html>
